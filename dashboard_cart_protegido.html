<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard CAR-T — Acesso Restrito</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0D1B2A 0%,#1B4F72 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
.logo{font-size:48px;margin-bottom:12px}
.login-box h1{font-size:20px;font-weight:700;color:#0D1B2A;margin-bottom:6px}
.login-box p{font-size:12px;color:#6B7280;margin-bottom:28px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EBF5FB;
  border:1px solid #AED6F1;border-radius:20px;padding:4px 12px;
  font-size:11px;color:#1B4F72;font-weight:600;margin-bottom:24px}
label{display:block;text-align:left;font-size:11px;font-weight:700;
  color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.input-wrap{position:relative;margin-bottom:20px}
input[type=password],input[type=text]{width:100%;padding:12px 44px 12px 14px;
  border:2px solid #E2E8F0;border-radius:8px;font-size:14px;outline:none;
  transition:border .2s;color:#1A1A2E}
input:focus{border-color:#1B4F72}
.toggle-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:16px;color:#9E9E9E;padding:2px}
.btn{width:100%;background:linear-gradient(135deg,#1B4F72,#0D1B2A);color:#fff;
  border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.6;cursor:not-allowed}
.error{background:#FADBD8;border:1px solid #E74C3C;border-radius:8px;
  padding:10px 14px;font-size:12px;color:#C0392B;margin-top:14px;display:none;font-weight:600}
.loading{display:none;margin-top:14px;font-size:12px;color:#6B7280}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #E2E8F0;
  border-top-color:#1B4F72;border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-note{margin-top:24px;font-size:10px;color:#9E9E9E}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🧬</div>
  <h1>Dashboard CAR-T</h1>
  <p>Coordenação de Avaliação em Tecnologias em Saúde<br>Operadora de Saúde · Base: maio 2026</p>
  <div class="badge">🔒 Acesso Restrito</div>
  <label for="pwd">Senha de acesso</label>
  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="Digite a senha..." autocomplete="current-password"/>
    <button class="toggle-eye" onclick="toggleEye()" title="Mostrar/ocultar">👁</button>
  </div>
  <button class="btn" id="btn" onclick="unlock()">Acessar Dashboard →</button>
  <div class="error" id="err">❌ Senha incorreta. Verifique e tente novamente.</div>
  <div class="loading" id="loading"><span class="spinner"></span>Descriptografando...</div>
  <div class="footer-note">Arquivo protegido com AES-256-GCM · PBKDF2</div>
</div>

function b64ToBytes(b64){
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}
function toggleEye(){
  const el = document.getElementById('pwd');
  el.type = el.type === 'password' ? 'text' : 'password';
}
async function unlock(){
  const pwd = document.getElementById('pwd').value.trim();
  if(!pwd) return;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  err.style.display = 'none';
  loading.style.display = 'block';
  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64ToBytes(SALT), iterations:100000, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false, ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:b64ToBytes(IV) },
      key,
      b64ToBytes(CT)
    );
    const html = new TextDecoder().decode(decrypted);
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.style.display = 'block';
    btn.disabled = false;
    loading.style.display = 'none';
  }
}
document.getElementById('pwd').addEventListener('keydown', e => {
  if(e.key === 'Enter') unlock();
});
</script>
